<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NLT Overlay</title>

    <style>
        body {
            margin: 0;
            background: transparent;
            font-family: Arial, sans-serif;
            color: white;
        }

        .overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            min-width: 360px;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #d9b23f;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.45);
        }

		.header {
		    background: #d9b23f;
		    color: #111;
		    font-size: 18px;
		    font-weight: bold;
		    padding: 8px 12px;

    		display: flex;
		    justify-content: space-between;
		    align-items: center;
		}

		.logo {
    		height: 32px;
		}

        .content {
            padding: 10px 12px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .row:last-child {
            border-bottom: none;
        }

        .label {
            color: #d9b23f;
            font-weight: bold;
            margin-right: 14px;
            font-size: 14px;
        }

        .value {
            color: white;
            text-align: right;
            flex: 1;
            font-size: 14px;
        }

        .position {
            font-size: 14px;
            font-weight: bold;
        }
        
        .good {
    		color: #A7E214;
		}

		.warning {
    		color: #d9b23f;
		}

		.danger {
    		color: #ff4d4d;
		}
        
    </style>
</head>

<body>
    <div class="overlay">
        <div class="header">
    		<span>NLT RACING</span>
    		<img src="/images/logo-nlt-racing.png" class="logo">
		</div>

<div class="content">
    <div class="row">
        <span class="label">Piloto</span>
        <span class="value" id="driverName">-</span>
    </div>

    <div class="row">
        <span class="label">Posição</span>
        <span class="value position" id="position">-</span>
    </div>

    <div class="row">
        <span class="label">Series</span>
        <span class="value" id="seriesName">-</span>
    </div>

    <div class="row">
        <span class="label">Classe</span>
        <span class="value" id="carClass">-</span>
    </div>

    <div class="row">
        <span class="label">Carro</span>
        <span class="value" id="vehicleName">-</span>
    </div>

    <div class="row">
        <span class="label">Melhor volta</span>
        <span class="value" id="bestLapTime">-</span>
    </div>

    <div class="row">
        <span class="label">Última volta</span>
        <span class="value" id="lastLapTime">-</span>
    </div>

    <div class="row">
        <span class="label">Energia Virtual</span>⚡
        <span class="value" id="virtualEnergyPercent">-</span>
    </div>

    <div class="row">
        <span class="label">Combustível</span>⛽
        <span class="value" id="fuelLiters">-</span>
    </div>
</div>
    </div>

    <script>
        async function loadOverlay() {
            try {
                const response = await fetch('/overlay/broadcast/selected-car');

                if (!response.ok) {
                    throw new Error('Erro ao buscar dados');
                }

                const data = await response.json();

                document.getElementById('driverName').textContent = data.driverName ?? '-';
                document.getElementById('position').textContent = data.position ?? '-';

                const positionEl = document.getElementById('position');
                positionEl.className = 'value position';

                if (data.position >= 1 && data.position <= 3) {
                    positionEl.classList.add('good');
                } else if (data.position >= 4 && data.position <= 10) {
                    positionEl.classList.add('warning');
                }

                document.getElementById('seriesName').textContent = data.seriesName ?? '-';
                document.getElementById('carClass').textContent = data.carClass ?? '-';
                document.getElementById('vehicleName').textContent = data.vehicleName ?? '-';
                document.getElementById('bestLapTime').textContent = data.bestLapTime ?? '-';
                document.getElementById('lastLapTime').textContent = data.lastLapTime ?? '-';
                document.getElementById('virtualEnergyPercent').textContent = (data.virtualEnergyPercent ?? '-') + '%';
                document.getElementById('fuelLiters').textContent = (data.fuelLiters ?? '-') + 'L';

                const fuelEl = document.getElementById('fuelLiters');
                fuelEl.className = 'value';

                if (data.fuelLiters <= 10) {
                    fuelEl.classList.add('danger');
                } else if (data.fuelLiters <= 30) {
                    fuelEl.classList.add('warning');
                } else {
                    fuelEl.classList.add('good');
                }
                
                const evEl = document.getElementById('virtualEnergyPercent');
                evEl.className = 'value';

                if (data.virtualEnergyPercent <= 10.0) {
                    evEl.classList.add('danger');
                } else if (data.virtualEnergyPercent <= 30.0) {
                    evEl.classList.add('warning');
                } else {
                    evEl.classList.add('good');
                }
                
            } catch (error) {
                console.error('Falha ao atualizar overlay:', error);
            }
        }

        loadOverlay();
        setInterval(loadOverlay, 1000); /* 1s = 1000  1000 = 1 FPS */
    </script>
</body>
</html>
